<body bgcolor="lightcyan">

    <h1>Sample Form</h1>
    <u>
    <p class="p">

    </u>
    </div>
    <br>
    <form action="https://formspree.io/f/mldrknvp" method="POST">
<div class="allcontainer">
    <div class="n">
    <label>Full Name:</label>
    <br>   
    <input class="name" required placeholder="Name" name="Full Name">
    </div>
    <br>
    <div class="a">
    <label>Age:</label>
    <br>
    <input class="age" id="age" type="range" min="13" max="100" step="1" value="0" oninput="ageOutput.value=age.value" required name="Age">
    <br>
 <output id="ageOutput">13     
 </output>
 </div>

    <label>Female</label>
    <br>
    <input type="radio" class="other" name="Gender" required>
    <label>Other</label>
